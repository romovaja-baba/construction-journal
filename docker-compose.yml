version: "3.9"

services:
    postgres:
        image: postgres:16-alpine
        restart: unless-stopped
        environment:
            POSTGRES_USER: journal
            POSTGRES_PASSWORD: journal
            POSTGRES_DB: journal
        ports:
            - "5432:5432"
        volumes:
            - pgdata:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U journal -d journal"]
            interval: 5s
            timeout: 5s
            retries: 10

    backend:
        build:
            context: ./backend
            dockerfile: Dockerfile
        restart: unless-stopped
        environment:
            DB_HOST: postgres
            DB_USER: journal
            DB_PASSWORD: journal
            DB_NAME: journal
            DB_PORT: 5432
            PORT: 8080
            GIN_MODE: release
        depends_on:
            postgres:
                condition: service_healthy
        ports:
            - "8080:8080"

    frontend:
        build:
            context: ./frontend
            dockerfile: Dockerfile
        restart: unless-stopped
        ports:
            - "5173:5173"
        depends_on:
            - backend

volumes:
    pgdata:
